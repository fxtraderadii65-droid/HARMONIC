<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hormonic Trader Raj</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a1a3f, #08142b);
    color: #ffffff;
    text-align: center;
}

/* Heading */
h1 {
    font-size: 30px;
    margin-top: 30px;
    color: #7fd6ff;
}

/* Card */
.card {
    width: 70%;
    max-width: 450px;
    margin: 20px auto;
    padding: 15px;
    border-radius: 10px;
    background: linear-gradient(145deg, #2c3e66, #25345a);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.card h2 {
    color: #7fd6ff;
    font-size: 14px;
}

.card p {
    font-size: 8px;
    color: #dcdcdc;
}

/* List */
ul {
    text-align: left;
    margin-top: 10px;
    padding-left: 10px;
}

ul li {
    margin: 6px 0;
    font-size: 9px;
}

ul li span {
    color: #7fd6ff;
    font-weight: bold;
}

/* 🌈 7 COLOR GRADIENT BUTTON */
.btn {
    display: inline-block;
    margin: 40px auto;
    padding: 18px 30px;
    width: 75%;
    max-width: 450px;
    border-radius: 15px;
    text-decoration: none;
    font-size: 15px;
    font-weight: bold;
    color: white;
    background: linear-gradient(270deg,
        red, orange, yellow, green, cyan, blue, violet);
    background-size: 1400% 1400%;
    animation: gradientMove 6s ease infinite;
    box-shadow: 0 5px 25px rgba(255,255,255,0.3);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.07);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* Gradient Animation */
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🔔 Fake Popup */
.popup {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #1c2e4a;
    padding: 12px 18px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    font-size: 14px;
    display: none;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>

</head>
<body>

<h1>Welcome To<br>Harmonic Trader Raj</h1>

<div class="card">
    <h2>VIP SIGNALS</h2>
    <p>Exclusive FX trading signals by RAJ </p>

    <ul>
        <li><span>1.</span> உண்மையான சந்தை பகுப்பாய்வு</li>
        <li><span>2.</span> நுழைவு & வெளியேறும் புள்ளிகள்</li>
        <li><span>3.</span> அபாய மேலாண்மை</li>
        <li><span>4.</span> 24/7 ஆதரவு</li>
    </ul>
</div>

<a href="https://t.me/+pk4cA9YRLdxjY2Y1" class="btn">
    Join Harmonic Trader Raj Community
</a>

<!-- 🔔 Fake Notification -->
<div class="popup" id="popup"></div>

<script>
const names = ["Ravi", "Amit", "Rahul", "Suresh", "Karan", "Vikram", "Ankit"];

function showPopup() {
    const popup = document.getElementById("popup");
    const randomName = names[Math.floor(Math.random() * names.length)];

    popup.innerHTML = "🔔 " + randomName + " just joined!";
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 3000);
}

// Show popup every 2 sec
setInterval(showPopup, 5000);
</script>

</body>
</html>
