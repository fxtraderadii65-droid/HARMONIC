/* Main Wrapper for Mobile Centering */

/* Heading */

/* Card */
.card {

/* List */
ul {
    text-align: left;
    padding-left: 15px;
    list-style: none;
}

ul li {
    margin: 10px 0;
    font-size: 14px;
    line-height: 1.4;
}

ul li span {
    color: #7fd6ff;
    font-weight: bold;
    margin-right: 5px;
}

/* 🌈 7 COLOR GRADIENT BUTTON */
.btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    border-radius: 15px;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background: linear-gradient(270deg,
        red, orange, yellow, green, cyan, blue, violet);
    background-size: 1400% 1400%;
    animation: gradientMove 6s ease infinite;
    box-shadow: 0 5px 25px rgba(255,255,255,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
}

.btn:active {
    transform: scale(0.98);
}

@media (min-width: 768px) {
    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
}

/* Gradient Animation */
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🔔 Fake Popup */
.popup {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 320px;
    background: #1c2e4a;
    padding: 12px 18px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    font-size: 14px;
    display: none;
    z-index: 999;
}

@media (min-width: 480px) {
    .popup {
        left: 20px;
        transform: none;
        width: auto;
    }
}
